name: Clinic App CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Task2/clinic_app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate generated submission artefacts
        run: python scripts/validate_submission.py

      - name: Compile Flask app
        working-directory: Task2/clinic_app
        run: python -m py_compile app.py

      - name: Run tests
        working-directory: Task2/clinic_app
        run: python -m pytest
