<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="392" viewBox="0 0 1180 392" role="img" aria-label="Use Case Preview">
<rect width="1180" height="392" fill="#ffffff"/>
<rect x="36" y="32" width="1108" height="328" rx="10" fill="#ffffff" stroke="#cfdbe3" stroke-width="2"/>
<text x="64" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172a3a">Use Case Preview</text>
<text x="64" y="112" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">Clinic Appointment System scoped doctor/admin workflow</text>
<rect x="64" y="96" width="1052" height="46" rx="8" fill="#f7fbfb" stroke="#d6e4e7"/><text x="86" y="125" font-family="Arial, sans-serif" font-size="18" fill="#172a3a"><tspan font-weight="700">1.</tspan> Patient: register/login, choose doctor, request appointment, cancel/reschedule own request</text><rect x="64" y="154" width="1052" height="46" rx="8" fill="#f7fbfb" stroke="#d6e4e7"/><text x="86" y="183" font-family="Arial, sans-serif" font-size="18" fill="#172a3a"><tspan font-weight="700">2.</tspan> Doctor: linked doctor queue only, manage own profile, review own appointments</text><rect x="64" y="212" width="1052" height="46" rx="8" fill="#f7fbfb" stroke="#d6e4e7"/><text x="86" y="241" font-family="Arial, sans-serif" font-size="18" fill="#172a3a"><tspan font-weight="700">3.</tspan> Admin: all queues, create doctor accounts/profiles, review any appointment</text><rect x="64" y="270" width="1052" height="46" rx="8" fill="#f7fbfb" stroke="#d6e4e7"/><text x="86" y="299" font-family="Arial, sans-serif" font-size="18" fill="#172a3a"><tspan font-weight="700">4.</tspan> Clinic System: generate SDLC evidence and maintain safety boundary</text>
</svg>
