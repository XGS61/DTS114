<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Sequence diagram for appointment booking and review">
  <rect width="980" height="520" fill="#ffffff"/>
  <g font-family="Arial" fill="#17202a">
    <text x="80" y="50" font-size="18" font-weight="700">Patient</text>
    <text x="240" y="50" font-size="18" font-weight="700">Patient UI</text>
    <text x="430" y="50" font-size="18" font-weight="700">Flask API</text>
    <text x="610" y="50" font-size="18" font-weight="700">JSON Store</text>
    <text x="810" y="50" font-size="18" font-weight="700">Staff UI</text>
  </g>
  <g stroke="#d9e2ec" stroke-width="2">
    <line x1="100" y1="70" x2="100" y2="470"/>
    <line x1="280" y1="70" x2="280" y2="470"/>
    <line x1="470" y1="70" x2="470" y2="470"/>
    <line x1="660" y1="70" x2="660" y2="470"/>
    <line x1="840" y1="70" x2="840" y2="470"/>
  </g>
  <g stroke="#18646f" stroke-width="2" marker-end="url(#arrow)" font-family="Arial" font-size="14" fill="#17202a">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#18646f"/>
      </marker>
    </defs>
    <line x1="100" y1="120" x2="280" y2="120"/>
    <text x="130" y="110">Submit request</text>
    <line x1="280" y1="170" x2="470" y2="170"/>
    <text x="310" y="160">POST /api/appointments</text>
    <line x1="470" y1="220" x2="660" y2="220"/>
    <text x="500" y="210">Save Pending Review</text>
    <line x1="840" y1="290" x2="470" y2="290"/>
    <text x="585" y="280">GET /api/appointments</text>
    <line x1="470" y1="350" x2="840" y2="350"/>
    <text x="585" y="340">Shared queue</text>
    <line x1="840" y1="410" x2="470" y2="410"/>
    <text x="560" y="400">PATCH review status</text>
    <line x1="470" y1="450" x2="660" y2="450"/>
    <text x="505" y="440">Persist review</text>
  </g>
</svg>
