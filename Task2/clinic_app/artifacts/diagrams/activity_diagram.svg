<svg xmlns="http://www.w3.org/2000/svg" width="760" height="680" viewBox="0 0 760 680" role="img" aria-label="Activity diagram for clinic appointment workflow">
  <rect width="760" height="680" fill="#ffffff"/>
  <g font-family="Arial" text-anchor="middle" fill="#17202a">
    <circle cx="380" cy="42" r="16" fill="#17202a"/>
    <rect x="250" y="80" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="380" y="110">Open login page</text>
    <polygon points="380,160 455,210 380,260 305,210" fill="#fff2dc" stroke="#b4661f"/>
    <text x="380" y="215">Role?</text>
    <rect x="70" y="300" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="200" y="330">Patient submits request</text>
    <rect x="70" y="380" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="200" y="410">Validate safety boundary</text>
    <rect x="70" y="460" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="200" y="490">Store Pending Review</text>
    <rect x="430" y="300" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="560" y="330">Staff reviews queue</text>
    <rect x="430" y="380" width="260" height="48" rx="8" fill="#f4f7fb" stroke="#18646f"/>
    <text x="560" y="410">Confirm or cancel</text>
    <rect x="250" y="550" width="260" height="48" rx="8" fill="#e8f5ef" stroke="#17623f"/>
    <text x="380" y="580">Show non-diagnostic summary</text>
    <circle cx="380" cy="640" r="16" fill="#ffffff" stroke="#17202a" stroke-width="4"/>
  </g>
  <g stroke="#18646f" stroke-width="2" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#18646f"/>
      </marker>
    </defs>
    <line x1="380" y1="58" x2="380" y2="80"/>
    <line x1="380" y1="128" x2="380" y2="160"/>
    <line x1="305" y1="210" x2="200" y2="300"/>
    <line x1="455" y1="210" x2="560" y2="300"/>
    <line x1="200" y1="348" x2="200" y2="380"/>
    <line x1="200" y1="428" x2="200" y2="460"/>
    <line x1="330" y1="484" x2="430" y2="324"/>
    <line x1="560" y1="348" x2="560" y2="380"/>
    <line x1="560" y1="428" x2="410" y2="550"/>
    <line x1="380" y1="598" x2="380" y2="624"/>
  </g>
</svg>
